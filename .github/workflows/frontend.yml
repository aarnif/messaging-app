name: Frontend pipeline

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  frontend_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Generate GraphQL frontend types
        run: npm run frontend:generate
      - name: Lint frontend
        run: npm run frontend:lint
      - name: Run frontend tests and coverage
        run: npm run frontend:test:coverage
        env:
          CI: true
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
